<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 760px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 760px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 45%, #CCFBF180 0%, #FFFBF5 70%);
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .wordmark {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 72px;
    color: #0B2A4A;
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .wordmark span { color: #0D9488; }
  .cradle {
    margin-top: 10px;
  }
  .caption {
    margin-top: 36px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0B2A4A;
    opacity: 0.4;
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="wordmark">Pocket<span>Cache</span></div>
    <!-- Cradle curve with coin resting in it -->
    <div class="cradle">
      <svg width="360" height="70" viewBox="0 0 360 70" xmlns="http://www.w3.org/2000/svg">
        <!-- Cupped hand / pocket cradle — a shallow U-curve -->
        <path d="M30 8 Q180 62 330 8"
              fill="none" stroke="#0B2A4A" stroke-width="3.5" stroke-linecap="round" opacity="0.18"/>
        <!-- Gold coin resting in the bottom of the cradle -->
        <circle cx="180" cy="50" r="22" fill="#E5A800"/>
        <circle cx="180" cy="50" r="18" fill="#FBBF24"/>
        <circle cx="180" cy="50" r="13" fill="#FDE68A"/>
      </svg>
    </div>
    <div class="caption">Cradle Curve</div>
  </div>
</div>
</body>
</html>
