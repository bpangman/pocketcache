<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 760px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 760px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 45%, #FEF3C7 0%, #FFFBF5 70%);
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .lockup {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 36px;
  }
  .wordmark {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 72px;
    color: #0B2A4A;
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .wordmark span {
    color: #F97316;
  }
  .caption {
    margin-top: 48px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0B2A4A;
    opacity: 0.4;
  }
  .rule {
    width: 120px;
    height: 2px;
    background: #FBBF24;
    border-radius: 1px;
    margin-top: 36px;
    margin-bottom: 16px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="lockup">
      <!-- Coin emblem on LEFT -->
      <svg width="150" height="160" viewBox="0 0 150 160" xmlns="http://www.w3.org/2000/svg">
        <!-- Curved round-up arc above coin -->
        <!-- Arrow arc: goes from left, curves up and over, arrow at right end -->
        <path d="M 30 38 Q 75 -8 120 38" fill="none" stroke="#F97316" stroke-width="6" stroke-linecap="round"/>
        <!-- Arrowhead at right end of arc -->
        <polygon points="120,38 107,26 113,42" fill="#F97316"/>

        <!-- Outer shadow rim -->
        <circle cx="75" cy="108" r="50" fill="#D97706"/>
        <!-- Main coin -->
        <circle cx="75" cy="108" r="45" fill="#FBBF24"/>
        <!-- Inner highlight -->
        <circle cx="75" cy="108" r="38" fill="#FDE68A"/>
        <!-- Ridge notches around rim -->
        <circle cx="75" cy="108" r="45" fill="none" stroke="#F59E0B" stroke-width="2.5" stroke-dasharray="4 6"/>
        <!-- Heart embossed at center -->
        <!-- Heart path centered at 75,108 -->
        <path d="M75 122 C55 108 55 90 66 86 C70 84 75 87 75 90 C75 87 80 84 84 86 C95 90 95 108 75 122Z"
              fill="#F97316" opacity="0.9"/>
      </svg>

      <!-- Wordmark to the right -->
      <div class="wordmark">Pocket<span>Cache</span></div>
    </div>

    <div class="rule"></div>
    <div class="caption">Change with Heart</div>
  </div>
</div>
</body>
</html>
