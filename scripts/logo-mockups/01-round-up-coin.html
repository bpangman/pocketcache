<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 760px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 760px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    overflow: hidden;
  }
  /* Soft radial background */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 45%, #FEF3C7 0%, #FFFBF5 70%);
    z-index: 0;
  }
  /* Decorative corner dots */
  .card::after {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      radial-gradient(circle 3px at 80px 80px, #FBBF2440 0%, transparent 100%),
      radial-gradient(circle 2px at 1120px 80px, #F9731640 0%, transparent 100%),
      radial-gradient(circle 3px at 80px 680px, #F9731630 0%, transparent 100%),
      radial-gradient(circle 2px at 1120px 680px, #FBBF2440 0%, transparent 100%);
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  /* The integrated wordmark row */
  .wordmark-row {
    display: flex;
    align-items: center;
    justify-content: center;
    line-height: 1;
  }
  .wm-text {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 96px;
    color: #0B2A4A;
    letter-spacing: -2px;
    line-height: 1;
  }
  .wm-text-orange {
    color: #F97316;
  }
  .coin-o {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    position: relative;
    vertical-align: middle;
  }
  .caption {
    margin-top: 48px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0B2A4A;
    opacity: 0.4;
  }
  /* Thin rule above caption */
  .rule {
    width: 120px;
    height: 2px;
    background: #FBBF24;
    border-radius: 1px;
    margin-top: 36px;
    margin-bottom: 16px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <!-- Integrated wordmark: P[coin]cketCache -->
    <!-- "Pocket" with coin replacing 'o', then "Cache" -->
    <div class="wordmark-row">
      <!-- "P" in navy -->
      <span class="wm-text">P</span>

      <!-- COIN replacing the 'o' -->
      <svg width="88" height="88" viewBox="0 0 88 88" style="margin: 0 2px; flex-shrink:0; vertical-align:middle; position:relative; top:0px;">
        <!-- Outer ring / shadow rim -->
        <circle cx="44" cy="44" r="43" fill="#D97706" />
        <!-- Main coin face -->
        <circle cx="44" cy="44" r="38" fill="#FBBF24" />
        <!-- Inner bright highlight -->
        <circle cx="44" cy="44" r="32" fill="#FDE68A" />
        <!-- Inner rim line -->
        <circle cx="44" cy="44" r="32" fill="none" stroke="#F59E0B" stroke-width="2"/>
        <!-- Up chevron / arrow -->
        <polyline points="44,22 30,38 38,38 38,58 50,58 50,38 58,38" fill="#D97706" stroke="none"/>
        <!-- Arrowhead tip already handled by polyline -->
      </svg>

      <!-- "cketCache" — "cket" in navy, "Cache" in orange -->
      <span class="wm-text">cket</span><span class="wm-text wm-text-orange">Cache</span>
    </div>

    <div class="rule"></div>
    <div class="caption">Round-Up Coin</div>
  </div>
</div>
</body>
</html>
