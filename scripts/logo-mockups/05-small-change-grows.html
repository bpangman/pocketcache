<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=1200">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 760px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    font-family: 'Poppins', sans-serif;
    overflow: hidden;
  }
  .card {
    width: 1200px;
    height: 760px;
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    background: #FFFBF5;
    overflow: hidden;
  }
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 70% 60% at 50% 45%, #CCFBF180 0%, #FFFBF5 70%);
    z-index: 0;
  }
  .content {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }
  .lockup {
    display: flex;
    flex-direction: row;
    align-items: center;
    gap: 40px;
  }
  .wordmark {
    font-family: 'Poppins', sans-serif;
    font-weight: 800;
    font-size: 72px;
    color: #0B2A4A;
    letter-spacing: -1.5px;
    line-height: 1;
  }
  .wordmark span {
    color: #0D9488;
  }
  .caption {
    margin-top: 48px;
    font-family: 'Poppins', sans-serif;
    font-weight: 700;
    font-size: 18px;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: #0B2A4A;
    opacity: 0.4;
  }
  .rule {
    width: 120px;
    height: 2px;
    background: #FBBF24;
    border-radius: 1px;
    margin-top: 36px;
    margin-bottom: 16px;
    opacity: 0.6;
  }
</style>
</head>
<body>
<div class="card">
  <div class="content">
    <div class="lockup">
      <!-- Cupped hands with coin and sprout -->
      <svg width="200" height="190" viewBox="0 0 200 190" xmlns="http://www.w3.org/2000/svg">
        <!-- Left hand cupped -->
        <!-- Palm/cup: a bowl shape made of two curves -->
        <path d="M 20 130
                 Q 15 100 25 85
                 Q 32 75 42 80
                 L 50 88
                 Q 55 80 58 74
                 Q 62 66 70 68
                 Q 76 70 74 80
                 L 72 90
                 Q 80 82 84 78
                 Q 90 72 97 75
                 Q 103 78 100 88
                 L 95 100"
              fill="none" stroke="#0B2A4A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Right hand cupped -->
        <path d="M 180 130
                 Q 185 100 175 85
                 Q 168 75 158 80
                 L 150 88
                 Q 145 80 142 74
                 Q 138 66 130 68
                 Q 124 70 126 80
                 L 128 90
                 Q 120 82 116 78
                 Q 110 72 103 75
                 Q 97 78 100 88
                 L 105 100"
              fill="none" stroke="#0B2A4A" stroke-width="9" stroke-linecap="round" stroke-linejoin="round"/>

        <!-- Bowl / cup base connecting both hands -->
        <path d="M 20 130 Q 100 165 180 130"
              fill="none" stroke="#0B2A4A" stroke-width="9" stroke-linecap="round"/>

        <!-- Coin in the hands -->
        <circle cx="100" cy="110" r="30" fill="#D97706"/>
        <circle cx="100" cy="110" r="26" fill="#FBBF24"/>
        <circle cx="100" cy="110" r="21" fill="#FDE68A"/>
        <circle cx="100" cy="110" r="21" fill="none" stroke="#F59E0B" stroke-width="1.5"/>
        <!-- Small $ or coin mark on coin -->
        <text x="100" y="118" text-anchor="middle" font-size="22" font-weight="bold" fill="#D97706" font-family="Poppins,sans-serif">¢</text>

        <!-- Sprout growing from top of coin -->
        <!-- Stem -->
        <line x1="100" y1="80" x2="100" y2="42" stroke="#0D9488" stroke-width="5" stroke-linecap="round"/>
        <!-- Left leaf -->
        <path d="M 100 58 Q 80 50 76 36 Q 90 38 100 58Z" fill="#0D9488"/>
        <!-- Right leaf -->
        <path d="M 100 48 Q 120 40 124 26 Q 110 28 100 48Z" fill="#14B8A6"/>
      </svg>

      <!-- Wordmark -->
      <div class="wordmark">Pocket<span>Cache</span></div>
    </div>

    <div class="rule"></div>
    <div class="caption">Small Change Grows</div>
  </div>
</div>
</body>
</html>
