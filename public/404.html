<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PocketCache</title>
<script>
  // Vanity join links: pocketcache.app/BGCA → the app, pre-bound to that org.
  // GitHub Pages serves this 404 page for any unknown path; if the path looks
  // like a join code (single short slug), forward it to the app's ?org= deep
  // link. Anything else falls through to the friendly not-found content below.
  (function () {
    var seg = window.location.pathname.replace(/^\/+|\/+$/g, '');
    if (/^[A-Za-z0-9-]{2,12}$/.test(seg)) {
      window.location.replace('/demo/?orgpage=' + encodeURIComponent(seg.toUpperCase()));
    }
  })();
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
         background: linear-gradient(135deg, #0B2A4A 0%, #003865 100%); color: #fff;
         min-height: 100vh; display: flex; align-items: center; justify-content: center;
         margin: 0; text-align: center; }
  .card { padding: 2rem; max-width: 420px; }
  h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
  p { color: rgba(255,255,255,0.75); font-size: 0.95rem; line-height: 1.6; }
  a { color: #FBBF24; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Hmm, that page isn't here.</h1>
    <p>If a nonprofit gave you a link or code, open the app and enter it there —
       or head to <a href="/">pocketcache.app</a> to start fresh.</p>
  </div>
</body>
</html>
