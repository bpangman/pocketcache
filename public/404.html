<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>PocketCache</title>
<script>
  // Vanity links: pocketcache.app/BGCA → that org's micro-site, and
  // pocketcache.app/BGCA/give → the giving app itself, pre-bound to the org
  // (that's where a donor lands after "start giving in your browser"  -  the
  // URL is refresh- and bookmark-safe because this forwarder recreates it).
  // GitHub Pages serves this 404 page for any unknown path; anything that
  // doesn't look like a join code falls through to the not-found content.
  (function () {
    var parts = window.location.pathname.replace(/^\/+|\/+$/g, '').split('/');
    if (/^[A-Za-z0-9-]{2,12}$/.test(parts[0])) {
      var code = encodeURIComponent(parts[0].toUpperCase());
      if (parts.length === 2 && /^give$/i.test(parts[1])) {
        window.location.replace('/demo/?org=' + code);
      } else if (parts.length === 1) {
        window.location.replace('/demo/?orgpage=' + code);
      }
    }
  })();
</script>
<style>
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
         background: linear-gradient(135deg, #0B2A4A 0%, #003865 100%); color: #fff;
         min-height: 100vh; display: flex; align-items: center; justify-content: center;
         margin: 0; text-align: center; }
  .card { padding: 2rem; max-width: 420px; }
  h1 { font-size: 1.6rem; margin: 0 0 0.5rem; }
  p { color: rgba(255,255,255,0.75); font-size: 0.95rem; line-height: 1.6; }
  a { color: #FBBF24; font-weight: 600; text-decoration: none; }
</style>
</head>
<body>
  <div class="card">
    <h1>Hmm, that page isn't here.</h1>
    <p>If a nonprofit gave you a link or code, open the app and enter it there, or head to <a href="/">pocketcache.app</a> to start fresh.</p>
  </div>
</body>
</html>
