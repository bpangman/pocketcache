<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>PocketCache</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      html, body {
        background: #0B2A4A;
        color: #fff;
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        height: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px;
      }
      .container { max-width: 320px; }
      .logo { font-size: 2rem; font-weight: 700; color: #5EEAD4; margin-bottom: 16px; }
      .message { font-size: 1rem; color: rgba(255,255,255,0.7); margin-bottom: 24px; line-height: 1.5; }
      .link { color: #5EEAD4; text-decoration: none; font-weight: 600; }
      .link:hover { text-decoration: underline; }
    </style>
  </head>
  <body>
    <div class="container">
      <div class="logo">PocketCache</div>
      <p class="message">PocketCache needs an internet connection to load.</p>
      <a class="link" href="https://pocketcache.app">Open pocketcache.app</a>
    </div>
  </body>
</html>
